<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Navaja Dorada - Registrarse</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0e0e0e; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #353535; 
        }
        
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(53, 53, 53, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Gold gradient utility for buttons */
        .gold-gradient-btn {
            background: linear-gradient(135deg, #f2ca50 0%, #d4af37 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<main class="w-full max-w-md mx-auto flex flex-col h-full bg-surface">
<!-- Header / Logo Area -->
<header class="flex flex-col items-center justify-center pt-12 pb-8">
<span class="material-symbols-outlined text-primary text-4xl mb-3" style="font-variation-settings: 'wght' 200;">
                content_cut
            </span>
<h1 class="font-headline font-bold text-2xl tracking-[0.2em] text-primary-container text-center uppercase">
                Navaja Dorada
            </h1>
</header>
<!-- Auth Tabs -->
<div class="flex flex-row w-full mb-10 border-b border-surface-container-highest">
<a class="flex-1 pb-4 text-center font-headline font-medium text-on-surface-variant hover:text-on-surface transition-colors" href="#">
                Iniciar sesión
            </a>
<div class="flex-1 pb-4 text-center font-headline font-bold text-primary relative">
                Registrarse
                <!-- Active Tab Indicator -->
<div class="absolute bottom-0 left-0 w-full h-[2px] bg-primary"></div>
</div>
</div>
<!-- Registration Form -->
<form class="flex flex-col space-y-6 flex-grow">
<!-- Email Input -->
<div class="relative group">
<label class="absolute -top-2.5 left-0 text-xs font-label text-outline group-focus-within:text-primary transition-colors bg-surface px-1" for="email">
                    Correo electrónico
                </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body py-3 px-1 transition-colors" id="email" placeholder="tu@email.com" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<label class="absolute -top-2.5 left-0 text-xs font-label text-outline group-focus-within:text-primary transition-colors bg-surface px-1" for="password">
                    Contraseña
                </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body py-3 px-1 pr-10 transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-2 top-3 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
<!-- Password Strength Indicator -->
<div class="flex flex-col space-y-2 mt-1">
<div class="flex space-x-1 h-1.5 w-full">
<div class="flex-1 bg-error rounded-l-full"></div>
<div class="flex-1 bg-surface-container-highest"></div>
<div class="flex-1 bg-surface-container-highest"></div>
<div class="flex-1 bg-surface-container-highest rounded-r-full"></div>
</div>
<span class="text-xs font-label text-error">Débil</span>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start space-x-3 pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-outline-variant bg-surface-container-lowest text-primary focus:ring-primary focus:ring-offset-surface" id="terms" type="checkbox"/>
</div>
<label class="text-sm font-body text-on-surface-variant leading-tight" for="terms">
                    Acepto los <a class="text-primary hover:underline" href="#">términos y condiciones</a> y la <a class="text-primary hover:underline" href="#">política de privacidad</a>.
                </label>
</div>
<!-- Spacer -->
<div class="flex-grow min-h-[24px]"></div>
<!-- Action Buttons -->
<div class="flex flex-col space-y-4 pb-8">
<button class="w-full gold-gradient-btn text-on-primary font-headline font-bold text-lg py-4 rounded-xl shadow-[0_8px_30px_rgba(0,0,0,0.4)] hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                    Crear cuenta
                </button>
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-surface-container-highest"></div>
<span class="flex-shrink-0 mx-4 text-outline text-xs font-label">O</span>
<div class="flex-grow border-t border-surface-container-highest"></div>
</div>
<button class="w-full bg-surface-container-highest text-on-surface font-headline font-semibold py-4 rounded-xl flex items-center justify-center space-x-2 hover:bg-surface-bright transition-colors" type="button">
<!-- Placeholder for Google Icon -->
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Continuar con Google</span>
</button>
</div>
</form>
</main>
</body></html>
