<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editar Servicio - Navaja Dorada</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#b4c5ff",
                    "secondary": "#c6c6c7",
                    "primary-fixed": "#ffe088",
                    "surface-container": "#20201f",
                    "primary": "#f2ca50",
                    "primary-fixed-dim": "#e9c349",
                    "inverse-on-surface": "#313030",
                    "on-tertiary": "#082b72",
                    "on-secondary": "#2f3131",
                    "on-error-container": "#ffdad6",
                    "secondary-container": "#454747",
                    "on-secondary-fixed-variant": "#454747",
                    "on-secondary-fixed": "#1a1c1c",
                    "primary-container": "#d4af37",
                    "secondary-fixed": "#e2e2e2",
                    "surface-tint": "#e9c349",
                    "on-primary-fixed": "#241a00",
                    "on-background": "#e5e2e1",
                    "tertiary-fixed": "#dbe1ff",
                    "surface": "#131313",
                    "on-primary": "#3c2f00",
                    "tertiary-container": "#97b0ff",
                    "on-tertiary-fixed-variant": "#27438a",
                    "on-tertiary-fixed": "#00174b",
                    "outline-variant": "#4d4635",
                    "surface-variant": "#353535",
                    "surface-container-highest": "#353535",
                    "on-surface": "#e5e2e1",
                    "error-container": "#93000a",
                    "on-error": "#690005",
                    "inverse-surface": "#e5e2e1",
                    "tertiary": "#bfcdff",
                    "on-primary-container": "#554300",
                    "inverse-primary": "#735c00",
                    "secondary-fixed-dim": "#c6c6c7",
                    "on-surface-variant": "#d0c5af",
                    "surface-container-low": "#1c1b1b",
                    "on-tertiary-container": "#254188",
                    "on-secondary-container": "#b4b5b5",
                    "outline": "#99907c",
                    "surface-dim": "#131313",
                    "surface-container-high": "#2a2a2a",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-bright": "#393939",
                    "background": "#131313",
                    "on-primary-fixed-variant": "#574500",
                    "error": "#ffb4ab"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom input floating label styles */
        .input-wrapper:focus-within label,
        .input-wrapper input:not(:placeholder-shown) ~ label,
        .input-wrapper textarea:not(:placeholder-shown) ~ label,
        .input-wrapper select:not([value=""]) ~ label {
            transform: translateY(-1.5rem) scale(0.85);
            color: theme('colors.primary');
        }
        .input-wrapper input:-webkit-autofill,
        .input-wrapper textarea:-webkit-autofill,
        .input-wrapper select:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px theme('colors.surface') inset !important;
            -webkit-text-fill-color: theme('colors.on-surface') !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-safe flex flex-col">
<!-- Task Header (Suppressed main navs due to transactional nature) -->
<header class="flex items-center justify-between px-6 py-5 bg-surface sticky top-0 z-40">
<button aria-label="Volver" class="text-on-surface hover:text-primary active:scale-95 flex items-center justify-center w-10 h-10 -ml-2" type="button">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-xl tracking-tight uppercase absolute left-1/2 -translate-x-1/2">Editar Servicio</h1>
<div class="w-10"></div> <!-- Balancer for centering -->
</header>
<!-- Main Content Form -->
<main class="flex-1 px-6 pt-4 pb-32 max-w-2xl mx-auto w-full">
<form class="space-y-10">
<!-- Nombre del servicio -->
<div class="relative input-wrapper mt-4">
<input class="peer w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface font-body text-lg py-2 px-0 shadow-none outline-none" id="serviceName" name="serviceName" placeholder=" " required="" type="text" value="Corte Imperial"/>
<label class="absolute left-0 top-2 text-on-surface-variant font-label text-base transform origin-left transition-transform duration-200 pointer-events-none" for="serviceName">
                    Nombre del servicio
                </label>
</div>
<!-- Categoría Dropdown -->
<div class="relative input-wrapper">
<select class="peer w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface font-body text-lg py-2 px-0 appearance-none outline-none cursor-pointer" id="serviceCategory" name="serviceCategory" required="">
<option class="bg-surface-container-high text-on-surface" value="cabello">Cabello</option>
<option class="bg-surface-container-high text-on-surface" value="barba">Barba</option>
<option class="bg-surface-container-high text-on-surface" value="tratamientos">Tratamientos</option>
<option class="bg-surface-container-high text-on-surface" value="combos">Combos</option>
</select>
<label class="absolute left-0 top-2 text-primary font-label text-base transform -translate-y-6 scale-85 origin-left pointer-events-none" for="serviceCategory">
                    Categoría
                </label>
<span class="material-symbols-outlined absolute right-0 top-3 text-on-surface-variant pointer-events-none">arrow_drop_down</span>
</div>
<!-- Descripción corta -->
<div class="relative input-wrapper">
<textarea class="peer w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface font-body text-base py-2 px-0 resize-none outline-none" id="serviceDescription" name="serviceDescription" placeholder=" " required="" rows="3">Un corte de cabello premium que incluye asesoría de imagen, lavado con productos especializados, corte a tijera o máquina y peinado final con pomadas de alta gama.</textarea>
<label class="absolute left-0 top-2 text-on-surface-variant font-label text-base transform origin-left transition-transform duration-200 pointer-events-none" for="serviceDescription">
                    Descripción corta
                </label>
</div>
<div class="grid grid-cols-2 gap-8">
<!-- Precio -->
<div class="relative input-wrapper">
<span class="absolute left-0 top-2 text-on-surface-variant">$</span>
<input class="peer w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface font-body text-lg py-2 pl-4 pr-0 outline-none" id="servicePrice" name="servicePrice" placeholder=" " required="" type="number" value="45"/>
<label class="absolute left-0 top-2 text-on-surface-variant font-label text-base transform origin-left transition-transform duration-200 pointer-events-none" for="servicePrice">
                        Precio
                    </label>
</div>
<!-- Duración -->
<div class="relative input-wrapper">
<input class="peer w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface font-body text-lg py-2 px-0 outline-none" id="serviceDuration" name="serviceDuration" placeholder=" " required="" type="number" value="45"/>
<label class="absolute left-0 top-2 text-on-surface-variant font-label text-base transform origin-left transition-transform duration-200 pointer-events-none" for="serviceDuration">
                        Duración (min)
                    </label>
</div>
</div>
<!-- Spacer -->
<div class="h-4"></div>
<!-- Switch Destacado -->
<div class="flex items-center justify-between p-5 bg-surface-container-low rounded-xl">
<div class="flex flex-col">
<span class="font-body font-medium text-on-surface text-lg">Servicio destacado</span>
<span class="font-label text-sm text-on-surface-variant mt-1">Mostrar en la pantalla principal</span>
</div>
<!-- Toggle UI (Simulated checked state for "Editar") -->
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-14 h-7 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface after:border-on-surface after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</form>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-surface-container-lowest via-surface to-transparent pt-12 pb-8 px-6 z-40">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold uppercase tracking-widest py-4 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] hover:brightness-110 active:scale-95 text-lg" type="submit">
                Guardar cambios
            </button>
</div>
</div>
</body></html>
