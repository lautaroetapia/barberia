</div>
<h1 class="font-manrope tracking-tighter text-white text-xl font-bold tracking-[0.2em] text-[#D4AF37]">NAVAJA DORADA</h1>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden hover:text-[#F2CA50] transition-colors duration-300 scale-95 active:opacity-80 transition-transform cursor-pointer border border-outline-variant/15">

</div>

<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface mb-8">Más</h2>
<div class="space-y-4">
<!-- Option Item 1 -->
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-colors text-left group">
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">store</span>
<span class="font-body text-base text-on-surface font-medium">Datos de barbería</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Option Item 2 -->
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-colors text-left group">
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">schedule</span>
<span class="font-body text-base text-on-surface font-medium">Horario semanal</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Option Item 3 -->
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-colors text-left group">

<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">policy</span>

</button>

<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">bar_chart</span>
<span class="font-body text-base text-on-surface font-medium">Reportes</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Option Item 5 -->

<span class="material-symbols-outlined text-primary group-hover:text-primary-container transition-colors">swap_horiz</span>
<span class="font-body text-base text-primary font-medium">Cambiar a vista Barbero</span>
</div>
<span class="material-symbols-outlined text-primary">chevron_right</span>
</button>

<span class="font-body text-base text-on-surface font-medium">Soporte</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
</div>
<div class="mt-12 text-center">
<span class="font-label text-sm text-outline">Versión 2.1.0</span>
</div>

<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-neutral-500 px-4 py-2 hover:text-white transition-all active:scale-90 transition-all duration-200">

<span class="font-manrope text-[10px] font-medium uppercase tracking-widest">Agenda</span>
</button>
