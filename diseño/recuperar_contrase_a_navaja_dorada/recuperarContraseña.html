<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recuperar contraseña - Navaja Dorada</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#c6c6c7",
                        "secondary": "#c6c6c7",
                        "surface-container-lowest": "#0e0e0e",
                        "primary-fixed-dim": "#e9c349",
                        "primary": "#f2ca50",
                        "surface-dim": "#131313",
                        "primary-container": "#d4af37",
                        "error-container": "#93000a",
                        "secondary-fixed": "#e2e2e2",
                        "outline": "#99907c",
                        "on-secondary-container": "#b4b5b5",
                        "on-error": "#690005",
                        "background": "#131313",
                        "surface": "#131313",
                        "inverse-surface": "#e5e2e1",
                        "surface-bright": "#393939",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#97b0ff",
                        "surface-variant": "#353535",
                        "on-secondary": "#2f3131",
                        "surface-tint": "#e9c349",
                        "on-tertiary-fixed": "#00174b",
                        "surface-container-low": "#1c1b1b",
                        "secondary-container": "#454747",
                        "on-primary-container": "#554300",
                        "on-primary": "#3c2f00",
                        "tertiary-fixed": "#dbe1ff",
                        "on-surface": "#e5e2e1",
                        "surface-container-highest": "#353535",
                        "on-tertiary-fixed-variant": "#27438a",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed": "#ffe088",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-primary-fixed-variant": "#574500",
                        "surface-container": "#20201f",
                        "tertiary": "#bfcdff",
                        "outline-variant": "#4d4635",
                        "on-tertiary": "#082b72",
                        "error": "#ffb4ab",
                        "on-tertiary-container": "#254188",
                        "on-surface-variant": "#d0c5af",
                        "on-background": "#e5e2e1",
                        "on-secondary-fixed-variant": "#454747",
                        "inverse-primary": "#735c00",
                        "inverse-on-surface": "#313030",
                        "on-primary-fixed": "#241a00",
                        "tertiary-fixed-dim": "#b4c5ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased selection:bg-primary selection:text-on-primary">
<div class="max-w-md mx-auto min-h-screen flex flex-col relative overflow-hidden bg-surface">
<!-- Background Ambient Glow -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[200%] h-[500px] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-surface-container-high/40 via-surface/0 to-transparent pointer-events-none -z-10"></div>
<!-- Custom Header for Transactional Flow -->
<header class="flex items-center justify-between px-6 h-20 pt-4 relative z-10">
<button aria-label="Volver" class="w-12 h-12 flex items-center justify-center text-on-surface hover:text-primary transition-colors -ml-3">
<span class="material-symbols-outlined text-[28px]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-xl tracking-tight flex-1 text-center pr-9">Recuperar contraseña</h1>
</header>
<!-- Main Content -->
<main class="flex-1 px-8 pt-10 flex flex-col relative z-10">
<p class="font-body text-on-surface-variant text-base leading-relaxed mb-12">
                Ingresá tu email y te enviaremos un enlace.
            </p>
<form class="flex flex-col gap-10 flex-1">
<!-- Input Field (Underlined, Floating Label) -->
<div class="relative group">
<input class="peer block w-full appearance-none border-0 border-b border-outline bg-transparent px-0 py-3 pl-10 text-on-surface focus:border-primary focus:outline-none focus:ring-0 font-body text-lg transition-colors" id="email" placeholder=" " required="" type="email"/>
<label class="absolute top-3.5 -z-10 origin-[0] -translate-y-7 scale-75 transform text-outline font-label duration-300 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:left-0 peer-focus:-translate-y-7 peer-focus:scale-75 peer-focus:text-primary pl-10" for="email">
                        Correo electrónico
                    </label>
<span class="material-symbols-outlined absolute left-0 top-3 text-outline peer-focus:text-primary transition-colors text-[24px]" data-icon="mail">
                        mail
                    </span>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-headline font-bold text-lg py-4 rounded-xl mt-4 hover:bg-primary-container active:scale-[0.98] transition-all duration-300 shadow-[0_8px_30px_rgba(0,0,0,0.4)] relative overflow-hidden group" type="submit">
<span class="relative z-10">Enviar enlace</span>
<!-- Glassmorphism subtle gradient overlay on hover -->
<div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
</button>
</form>
</main>
<!-- Footer -->
<footer class="pb-12 pt-6 px-6 text-center relative z-10 mt-auto">
<a class="inline-flex items-center gap-2 font-label text-sm text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-0.5" href="#">
                Volver a Iniciar sesión
            </a>
</footer>
</div>
</body></html>
