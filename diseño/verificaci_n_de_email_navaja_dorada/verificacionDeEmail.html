<body class="bg-background text-on-surface font-body min-h-screen flex flex-col antialiased selection:bg-primary/30">
<!-- TopAppBar Component -->
<header class="bg-[#131313] dark:bg-[#131313] fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 font-manrope tracking-tighter text-white transition-colors duration-300">
<button aria-label="Menu" class="text-[#D4AF37] hover:text-[#F2CA50] transition-colors duration-300 scale-95 active:opacity-80 flex items-center justify-center w-10 h-10 rounded-full">

</button>
<h1 class="text-xl font-bold tracking-[0.2em] text-[#D4AF37] uppercase">NAVAJA DORADA</h1>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant/15 flex items-center justify-center">

<span class="material-symbols-outlined text-on-surface-variant" data-icon="person">person</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12 w-full max-w-md mx-auto">
<!-- Illustration Area -->
<div class="relative w-40 h-40 mb-10 flex items-center justify-center">
<!-- Ambient Glow for Depth -->
<div class="absolute inset-0 bg-primary/10 blur-[40px] rounded-full"></div>
<img alt="Envelope illustration" class="relative z-10 w-full h-full object-contain drop-shadow-2xl opacity-90 filter grayscale contrast-125" data-alt="Minimalist dark grey envelope with a glowing liquid gold wax seal in the center, isolated on a pure dark background, high fashion editorial lighting, subtle metallic textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDOQGuCIC4eMDr9-5k_-5CnDRPNbxW62FkkG-XdxaV-nEbKZlQ5R5kz_BOJhd7XVVxszvkeG2HYp-sK0MIWiOqqCvVLf5YKQQ-quQNP-3TrhD1eZ48gw--4_s5PGEDmlSZSLEoGozGLGyWqb5iZG4Hk5RCvociDuFpo-H_AYcfNmicmh6X8yNYEPSPekywN_YEsTsTAETfnqVC5dZuE0CuEz10CbGAysMwYvi1jDoxZXoDv9omc6ISajov5KRX6vIjpzZS3nrDD6bXO"/>
<!-- Abstract Wax Seal Overlay (CSS representation to match prompt intent within DS) -->
<div class="absolute inset-0 flex items-center justify-center z-20 mix-blend-screen">
<div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary to-primary-container shadow-[0_0_20px_rgba(212,175,55,0.4)] flex items-center justify-center">
<span class="material-symbols-outlined text-[#3c2f00]" data-icon="content_cut" style="font-variation-settings: 'FILL' 1;">content_cut</span>
</div>
</div>
</div>
<!-- Typography Hierarchy -->
<h2 class="font-headline text-3xl md:text-4xl font-bold text-on-surface text-center mb-4 tracking-tighter leading-tight">
            ¡Estás a un paso!
        </h2>
<p class="font-body text-base text-on-surface-variant text-center max-w-[280px] mb-10 leading-relaxed">
            Enviamos un enlace a tu correo. Activá tu cuenta para continuar.
        </p>
<!-- Primary Action Button (The "Golden Touch") -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-label font-bold text-lg py-4 px-6 rounded-xl shadow-[0_0_40px_rgba(0,0,0,0.5)] hover:shadow-[0_0_50px_rgba(242,202,80,0.2)] transition-all duration-300 active:scale-[0.98] mb-8">
            Abrir correo
        </button>
<!-- Secondary Actions Area -->
<div class="flex flex-col items-center justify-center w-full space-y-2 mt-2">
<button class="bg-transparent text-primary font-label font-medium tracking-wide underline underline-offset-4 hover:text-primary-fixed transition-colors active:opacity-70">
                Reenviar
            </button>
<p class="font-body text-xs text-on-surface-variant/70 tracking-wide">
                Podrás reenviar en <span class="font-mono tabular-nums">60s</span>
</p>
</div>
<!-- Spacer to push bottom link down -->
<div class="flex-grow"></div>
<!-- Bottom Link -->
<button class="mt-12 font-label text-sm text-on-surface-variant hover:text-on-surface transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
