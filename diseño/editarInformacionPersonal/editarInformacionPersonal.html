                        "tertiary": "#bfcdff",
                        "primary-container": "#d4af37",
                        "inverse-on-surface": "#313030",
                        "secondary-fixed": "#e2e2e2",
                        "on-secondary-fixed-variant": "#454747",
                        "secondary-fixed-dim": "#c6c6c7",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface antialiased">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-[#131313]/90 backdrop-blur-md flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#D4AF37] cursor-pointer active:scale-95 duration-200">arrow_back</span>
<h1 class="font-headline font-bold tracking-tighter uppercase text-[#D4AF37] text-sm">Editar Perfil</h1>
</div>
<div class="text-lg font-black tracking-[0.2em] text-[#D4AF37]">NAVAJA DORADA</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Avatar Section -->
<section class="flex flex-col items-center mb-12">
<div class="relative">
<div class="w-32 h-32 rounded-full overflow-hidden p-1 bg-gradient-to-tr from-primary-container to-primary">
<div class="w-full h-full rounded-full overflow-hidden border-4 border-surface">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a stylish man with a well-groomed beard and modern haircut against a dark moody background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMQnXNhzgGJkuuCgOlgUj_j7kemmw2mRDGrm1-U4x8UkA9R5OGmV1xKckJzR9fQ9s0gA-N0LHqcnBobLjkJtd4cKYImggUMmBBqb5FA60Io3WuIIJlXguAnKx3gFo__6S4RQa0GR9ED1dab_L0FZfmcy4b9fmRGiiYp9xMNbBaBKduqlG-cuvA-lnkKVL5P0qDIeMkxCs5X5GW5C1UERLVI1BEgp0XwQYelKodCYfuizF2JkxPG0oN5X8bkFU7NtRZ1kuSl9ll7oV0"/>
</div>
</div>
<button class="absolute bottom-1 right-1 bg-primary text-on-primary p-2 rounded-full shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<p class="mt-4 text-primary font-headline font-medium tracking-wide text-sm uppercase">Actualizar Foto</p>
</section>
<!-- Form Section -->
<form class="space-y-8">
<!-- Name Input -->
<div class="group">
<label class="block text-outline font-label text-xs tracking-widest uppercase mb-2 ml-1">Nombre completo</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary text-on-surface px-4 py-3 rounded-t-xl focus:ring-0 transition-all outline-none font-headline font-medium" type="text" value="Julian Casablancas"/>
</div>
</div>
<!-- Phone Input -->
<div class="group">
<label class="block text-outline font-label text-xs tracking-widest uppercase mb-2 ml-1">Teléfono</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary text-on-surface px-4 py-3 rounded-t-xl focus:ring-0 transition-all outline-none font-headline font-medium" type="tel" value="+52 55 1234 5678"/>
</div>
</div>
<!-- Email Secondary Action -->
<div class="pt-4">
<button class="w-full py-4 border border-primary-container rounded-xl text-primary font-headline font-bold text-sm tracking-widest uppercase active:scale-95 transition-all" type="button">
                    Cambiar correo electrónico
                </button>
</div>
</form>
<!-- Artistic Quote / Signature Component -->
<div class="mt-16 text-center italic text-outline opacity-60 px-8">
<span class="material-symbols-outlined block mb-2 text-primary opacity-40">content_cut</span>
<p class="font-headline text-sm leading-relaxed">
                "La elegancia es la única belleza que nunca desaparece."
            </p>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface/95 to-transparent z-40">
<button class="w-full py-4 bg-gradient-to-r from-primary-container to-primary text-on-primary font-headline font-extrabold text-base tracking-[0.1em] uppercase rounded-xl shadow-[0_10px_30px_rgba(212,175,55,0.2)] active:scale-[0.98] transition-all">
            Guardar cambios
        </button>
</div>
<!-- Background Subtle Accents -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-1/4 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute top-0 right-0 w-[1px] h-full bg-gradient-to-b from-transparent via-primary/10 to-transparent"></div>
</div>
</body></html>
