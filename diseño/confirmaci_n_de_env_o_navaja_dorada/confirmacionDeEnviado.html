<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Navaja Dorada - Correo Enviado</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#2a2a2a",
                        "on-error": "#690005",
                        "inverse-on-surface": "#313030",
                        "tertiary": "#bfcdff",
                        "outline": "#99907c",
                        "primary-container": "#d4af37",
                        "primary": "#f2ca50",
                        "surface-bright": "#393939",
                        "on-primary-fixed-variant": "#574500",
                        "tertiary-fixed": "#dbe1ff",
                        "on-tertiary-fixed": "#00174b",
                        "on-secondary-fixed": "#1a1c1c",
                        "surface-container-highest": "#353535",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-container": "#454747",
                        "error": "#ffb4ab",
                        "on-surface": "#e5e2e1",
                        "surface-dim": "#131313",
                        "background": "#131313",
                        "on-error-container": "#ffdad6",
                        "on-background": "#e5e2e1",
                        "inverse-surface": "#e5e2e1",
                        "surface-variant": "#353535",
                        "error-container": "#93000a",
                        "tertiary-container": "#97b0ff",
                        "surface-container-low": "#1c1b1b",
                        "on-secondary": "#2f3131",
                        "on-surface-variant": "#d0c5af",
                        "primary-fixed-dim": "#e9c349",
                        "surface-container": "#20201f",
                        "secondary-fixed": "#e2e2e2",
                        "primary-fixed": "#ffe088",
                        "outline-variant": "#4d4635",
                        "on-tertiary-fixed-variant": "#27438a",
                        "on-primary-fixed": "#241a00",
                        "on-primary-container": "#554300",
                        "secondary": "#c6c6c7",
                        "on-primary": "#3c2f00",
                        "on-tertiary": "#082b72",
                        "on-secondary-container": "#b4b5b5",
                        "on-secondary-fixed-variant": "#454747",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-tertiary-container": "#254188",
                        "inverse-primary": "#735c00",
                        "surface": "#131313",
                        "tertiary-fixed-dim": "#b4c5ff",
                        "surface-tint": "#e9c349"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6 antialiased selection:bg-primary selection:text-on-primary">
<main class="w-full max-w-md flex flex-col items-center text-center space-y-10">
<!-- Illustration Area -->
<div class="relative w-40 h-40 flex items-center justify-center mb-4">
<!-- Subtle glow behind illustration -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl"></div>
<div class="relative z-10 w-32 h-32 bg-surface-container-high rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(0,0,0,0.4)] border border-outline-variant/15">
<div class="relative">
<span class="material-symbols-outlined text-6xl text-primary" data-icon="mail" style="font-variation-settings: 'FILL' 0, 'wght' 200;">mail</span>
<!-- Decorative Golden Razor Seal Idea -->
<div class="absolute -bottom-2 -right-2 w-10 h-10 bg-surface-container-lowest rounded-full flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-xl text-primary" data-icon="key" style="font-variation-settings: 'FILL' 1;">key</span>
</div>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-4">
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-surface">
                ¡Correo enviado!
            </h1>
<p class="font-body text-base text-on-surface-variant leading-relaxed max-w-[280px] mx-auto">
                Revisá tu bandeja. El enlace expira en 1h.
            </p>
</div>
<!-- Actions Section -->
<div class="w-full space-y-4 pt-6">
<!-- Primary Action -->
<button class="w-full py-4 px-6 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg tracking-wide hover:opacity-90 transition-opacity flex items-center justify-center gap-2 shadow-[0_0_30px_rgba(242,202,80,0.15)]">
                Abrir correo
                <span class="material-symbols-outlined text-lg" data-icon="open_in_new">open_in_new</span>
</button>
<!-- Secondary Action -->
<button class="w-full py-4 px-6 rounded-xl bg-transparent border border-outline-variant text-primary font-headline font-semibold text-base hover:bg-surface-container-high transition-colors flex items-center justify-center gap-2">
                Reenviar
                <span class="material-symbols-outlined text-base" data-icon="refresh">refresh</span>
</button>
</div>
<!-- Tertiary Action / Link -->
<div class="pt-8">
<a class="inline-flex items-center gap-2 text-on-surface-variant font-body text-sm hover:text-primary transition-colors border-b border-transparent hover:border-primary pb-1" href="#">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                Volver a Login
            </a>
</div>
</main>
</body></html>
