<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Header / Brand Anchor -->
<div class="flex flex-col items-center mb-12">
<span class="material-symbols-outlined text-primary text-4xl mb-3" style="font-variation-settings: 'FILL' 1;">content_cut</span>
<h1 class="font-headline text-2xl font-bold tracking-[0.2em] text-primary-container">NAVAJA DORADA</h1>
</div>
<!-- Main Login Card / Container -->
<div class="w-full max-w-md bg-surface-container-low p-8 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.4)]">
<!-- Tabs -->
<div class="flex w-full border-b border-outline-variant/30 mb-8">
<button class="flex-1 pb-4 border-b-2 border-primary text-primary font-headline font-semibold text-lg tracking-tight transition-colors">
                Iniciar sesión
            </button>
<button class="flex-1 pb-4 border-b-2 border-transparent text-secondary hover:text-on-surface font-headline font-semibold text-lg tracking-tight transition-colors">
                Registrarse
            </button>
</div>
<!-- Form -->
<form class="flex flex-col gap-8 w-full">
<!-- Email Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-transparent border-0 border-b border-outline text-on-surface font-body pl-10 pr-4 py-3 focus:ring-0 focus:border-primary transition-colors placeholder:text-outline/70" placeholder="Email" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-transparent border-0 border-b border-outline text-on-surface font-body pl-10 pr-10 py-3 focus:ring-0 focus:border-primary transition-colors placeholder:text-outline/70" placeholder="Contraseña" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-center mt-2 mb-4">
<a class="text-secondary hover:text-primary font-body text-sm underline-offset-4 hover:underline transition-all" href="#">
                    ¿Olvidaste tu contraseña?
                </a>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg py-4 rounded-xl shadow-[0_10px_30px_-10px_rgba(212,175,55,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-300" type="button">
                Entrar
            </button>
<!-- Divider -->
<div class="relative flex items-center justify-center my-2">
<div class="absolute w-full border-t border-outline-variant/30"></div>
<span class="relative bg-surface-container-low px-4 text-xs font-body text-secondary uppercase tracking-wider">o</span>
</div>
<!-- Secondary Action -->
<button class="w-full border border-outline-variant/50 hover:bg-surface-container-high text-on-surface font-headline font-medium text-base py-4 rounded-xl flex items-center justify-center gap-3 transition-all duration-300" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continuar con Google
            </button>
</form>
